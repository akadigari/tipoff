name: Tipoff scanner

# Volume-matched schedule (measured 2026-07; methodology in README "Scan
# cadence"): hourly through 13:00-06:59 UTC, the 18-hour block carrying ~89%
# of traded volume (US day + evening + late night), plus two touch-runs
# across the 07-12 UTC dead zone (~11% of volume) so no gap exceeds 3h.
# Minute :07 because GitHub delays top-of-the-hour crons heavily.
# NOTE: the schedule block below is rewritten by tipoff.py's minutes guard
# when self-throttling; comments inside it don't survive.
on:
  schedule:
    - cron: "7 0-6,13-23 * * *"
    - cron: "7 8,11 * * *"
  workflow_dispatch: {}   # manual "Run workflow" button for testing

permissions:
  contents: write         # the run commits the updated ledger/state back
  actions: read           # the minutes guard reads this repo's run history

concurrency:
  group: tipoff-scan      # never let two scans race on the same ledger
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scanner
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          # built-in token: lets the minutes guard measure this month's usage
          GH_TOKEN: ${{ github.token }}
          # OPTIONAL PAT (Contents + Workflows write): lets Tipoff rewrite
          # its own cron when it projects a minutes overrun. Absent -> it
          # falls back to skipping scans in place.
          WORKFLOW_EDIT_TOKEN: ${{ secrets.WORKFLOW_EDIT_TOKEN }}
        run: python tipoff.py

      - name: Commit ledger + state back to the repo
        run: |
          git config user.name "tipoff-bot"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add state ledger research
          if git diff --cached --quiet; then
            echo "nothing changed this cycle"
            exit 0
          fi
          git commit -m "tipoff: scan $(date -u +'%Y-%m-%d %H:%M UTC')"
          # another run may have pushed while we scanned; rebase then push
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}"
          git push

      - name: Alert on failure
        # A crashed run can't warn you itself — this step fires a red alert
        # whenever any step above failed, so silence never hides a breakage.
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          curl -s -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TELEGRAM_CHAT_ID}" \
            --data-urlencode text="🔴 Tipoff run FAILED — needs a checkup.
          Logs: https://github.com/${GITHUB_REPOSITORY}/actions/runs/${GITHUB_RUN_ID}" \
            > /dev/null || echo "telegram failure-alert also failed"
